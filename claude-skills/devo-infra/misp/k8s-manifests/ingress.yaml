---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: misp-ingress
  namespace: misp-prod
  labels:
    app: misp-server
  annotations:
    # NGINX Ingress Controller annotations
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"

    # Certificate Manager (optional - if using cert-manager)
    cert-manager.io/cluster-issuer: "letsencrypt-prod"

    # AWS ALB Ingress Controller annotations (alternative)
    # alb.ingress.kubernetes.io/scheme: internal
    # alb.ingress.kubernetes.io/target-type: ip
    # alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS":443}]'
    # alb.ingress.kubernetes.io/ssl-redirect: '443'
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - misp.internal.devo.com
    secretName: misp-tls-secret  # Created manually or by cert-manager
  rules:
  - host: misp.internal.devo.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: misp-server-internal
            port:
              number: 80
