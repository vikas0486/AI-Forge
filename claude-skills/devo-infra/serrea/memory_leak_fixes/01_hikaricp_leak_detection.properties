# HikariCP Leak Detection Configuration
# Add these lines to /opt/logtrust/serrea/conf/logtrust.properties
# Related: ISM-16256 - Memory Leak Fix
# Date: 2026-04-14

###############################################################################
# HIKARICP LEAK DETECTION - Add to existing serrea.hikari.* section
###############################################################################

# Enable leak detection (logs warning if connection held > 60 seconds)
serrea.hikari.leakDetectionThreshold=60000

# Reduce pool size to prevent connection exhaustion
serrea.hikari.maximum-pool-size=20
serrea.hikari.minimum-idle=5

# More aggressive connection testing
serrea.hikari.connection-test-query=SELECT 1
serrea.hikari.validation-timeout=3000

# Shorter connection lifetime (force refresh every 15 min)
serrea.hikari.max-lifetime=900000

# Connection timeout (fail fast if pool exhausted)
serrea.hikari.connection-timeout=30000

# IMPORTANT: Enable connection logging
serrea.hikari.register-mbeans=true

###############################################################################
# MAIN DB CONNECTION POOL (lt_site) - Update existing jdbc.* section
###############################################################################

# Already has removeAbandoned=true, but reduce timeout
jdbc.removeAbandonedTimeout=300

# Add connection validation
jdbc.validationQuery=SELECT 1
jdbc.validationInterval=30000
jdbc.testOnBorrow=true
jdbc.testWhileIdle=true

# Reduce max connections (was 30, now 20)
jdbc.maxActive=20
jdbc.maxIdle=10
jdbc.minIdle=5

###############################################################################
# MALOTE CONNECTION POOL - Update existing malote.jdbc.* section
###############################################################################

# Already unlimited (-1), add lifetime limit
malote.jdbc.maxConnLifetimeMillis=600000

# Reduce idle connections
malote.jdbc.maxIdle=50

# Enable expired connection logging (already there, ensure it's true)
malote.jdbc.logExpiredConnections=true
