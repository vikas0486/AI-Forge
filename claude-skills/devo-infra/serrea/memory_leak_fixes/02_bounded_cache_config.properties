# Bounded Cache Configuration for Serrea
# Add these lines to /opt/logtrust/serrea/conf/logtrust.properties
# Related: ISM-16256 - Fix Unbounded Cache Memory Leak
# Date: 2026-04-14

###############################################################################
# GUAVA CACHE CONFIGURATION (Unbounded Cache Fix)
###############################################################################

# Application-level cache settings
# These will be used by any Guava caches in the code

# Default cache maximum size (10,000 entries)
cache.default.maximumSize=10000

# Default cache expiration (1 hour)
cache.default.expireAfterWrite=3600

# Query results cache
cache.query.maximumSize=5000
cache.query.expireAfterWrite=1800

# Session cache
cache.session.maximumSize=2000
cache.session.expireAfterAccess=3600

# User cache
cache.user.maximumSize=1000
cache.user.expireAfterWrite=7200

# Domain cache
cache.domain.maximumSize=500
cache.domain.expireAfterWrite=3600

# Alert cache
cache.alert.maximumSize=3000
cache.alert.expireAfterWrite=1800

###############################################################################
# EHCACHE CONFIGURATION
###############################################################################

# If using Ehcache, reference this XML file
ehcache.config.location=/opt/logtrust/serrea/conf/ehcache.xml

###############################################################################
# HIBERNATE SECOND-LEVEL CACHE
###############################################################################

# Enable Hibernate second-level cache with size limits
hibernate.cache.use_second_level_cache=true
hibernate.cache.use_query_cache=true
hibernate.cache.region.factory_class=org.hibernate.cache.ehcache.EhCacheRegionFactory

# Query cache size limits
hibernate.cache.use_query_cache=true
hibernate.cache.query_cache_size=500

# Collection cache limits
hibernate.cache.default_cache_region_size=1000

###############################################################################
# CAFFEINE CACHE (Alternative to Guava - if supported)
###############################################################################

# Caffeine is a more modern alternative to Guava cache
caffeine.spec.default=maximumSize=10000,expireAfterWrite=1h
caffeine.spec.session=maximumSize=2000,expireAfterAccess=1h
caffeine.spec.query=maximumSize=5000,expireAfterWrite=30m
